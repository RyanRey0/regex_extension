<style>
        body {
            font-family: 'Inter', sans-serif;
            width: 380px;
            height: 600px;
            overflow-x: hidden;
            margin: 0;
            background-color: #fbf9f8;
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

            border-color: #000000 !important;

        }

        /* Custom Scrollbar for the preview area */

<body class="text-on-surface">
<!-- Top Navigation Bar -->
<header class="bg-white flex items-center justify-between w-full px-container-padding py-2 h-12 sticky top-0 z-50 border-b border-surface-variant">
<div class="flex items-center gap-2">
<h1 class="text-label-lg font-bold text-primary tracking-tight">Regex Extractor</h1>
</div>
</header>
<main class="px-container-padding py-4 space-y-section-margin">
<!-- PDF Section -->
<section class="space-y-stack-gap">
<h2 class="text-label-md text-primary tracking-wide uppercase">Documentos PDF</h2>
<div class="border-2 border-dashed border-gallagher-blue/50 rounded-lg p-6 flex flex-col items-center justify-center text-center transition-all duration-200 hover:border-primary hover:bg-secondary-container/20 cursor-pointer group bg-surface-container-low/50" id="dropzone">
<span class="material-symbols-outlined text-secondary group-hover:text-primary mb-2 transition-colors" style="font-size: 32px;">upload_file</span>
<p class="text-body-sm text-on-surface-variant font-medium">Arrastra o selecciona PDFs</p>
<input accept=".pdf" class="hidden" multiple="" type="file">
</div>
<p class="text-label-md text-outline italic">Sin archivos seleccionados</p>
</section>
<!-- Regex Selection -->
<section class="space-y-stack-gap">
<div class="flex items-center justify-between">
<h2 class="text-label-md text-primary tracking-wide uppercase">Librería Regex</h2>
<span class="material-symbols-outlined text-secondary hover:text-primary cursor-pointer transition-colors" style="font-size: 18px;">library_books</span>
</div>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant rounded px-3 py-2 text-body-sm appearance-none focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none">
<option>VL Crecer – Factura</option>
<option>Pacifico – Póliza</option>
<option>Rimac – Comprobante</option>
<option>General – Texto Plano</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 20px;">expand_more</span>
</div>
</div>
<p class="text-body-sm text-on-surface-variant/80 px-1">Factura Vida Ley emitida por Crecer Seguros</p>
</section>
<!-- Action Bar -->
<div class="flex justify-center items-center bg-secondary-container/30 rounded-full px-4 py-2 gap-4 border border-gallagher-blue/40 backdrop-blur-sm">
<button class="group flex items-center justify-center w-touch-target h-touch-target rounded-full bg-gallagher-blue text-primary transition-all duration-200 hover:brightness-95 active:scale-[0.95] shadow-sm" title="Ejecutar">
<span class="material-symbols-outlined font-bold" style="font-variation-settings: &quot;FILL&quot; 1;">play_circle</span>
</button>
<button class="group flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-error-container text-on-surface-variant hover:text-error transition-all duration-200 active:scale-[0.95]" title="Eliminar">
<span class="material-symbols-outlined">delete</span>
</button>
<button class="group flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-gallagher-blue/40 text-on-surface-variant hover:text-primary transition-all duration-200 active:scale-[0.95]" title="Ver Documento">
<span class="material-symbols-outlined">description</span>
</button>
<button class="group flex items-center justify-center w-touch-target h-touch-target rounded-full hover:bg-gallagher-blue/40 text-on-surface-variant hover:text-primary transition-all duration-200 active:scale-[0.95]" title="Configuración Regex">
<span class="material-symbols-outlined">code</span>
</button>
</div>
<!-- Preview Area -->
<section class="space-y-stack-gap pb-16">
<div class="flex items-center justify-between">
<h2 class="text-label-md text-primary tracking-wide uppercase">Vista previa</h2>
<button class="text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 16px;">content_copy</span>
                    COPIAR
                </button>
</div>
<div class="bg-surface-container-low/50 border border-gallagher-blue/30 rounded p-4 min-h-[140px] custom-scrollbar overflow-y-auto">
<pre class="font-mono-sm text-mono-sm text-on-surface whitespace-pre-wrap leading-relaxed">Esperando ejecución...</pre>
</div>
</section>
</main>
<script>
        // Micro-interactions for the dropzone
        const dropzone = document.getElementById('dropzone');

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.add('dropzone-active');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, e => {
                e.preventDefault();
                dropzone.classList.remove('dropzone-active');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        });

        dropzone.addEventListener('click', () => {
            dropzone.querySelector('input').click();
        });

        function handleFiles(files) {
            const statusText = document.querySelector('.italic');
            if (files.length > 0) {
                statusText.innerText = `${files.length} archivo(s) seleccionado(s)`;
                statusText.classList.replace('text-outline', 'text-primary');
                statusText.classList.add('font-medium');
            }
        }
    </script>


</body></html>
