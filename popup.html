<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Regex Extractor</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-surface text-ink font-sans antialiased">
    <div class="w-[400px] min-h-[480px] flex flex-col">
      <!-- header minimalista -->
      <header class="bg-ink text-surface px-4 py-2">
        <h1 class="text-sm font-semibold tracking-tight">Regex Extractor</h1>
      </header>

      <!-- contenido -->
      <main class="flex-1 px-4 py-3 space-y-3 overflow-y-auto bg-surface">
        <section>
          <label class="block text-xs font-medium text-primary mb-1">
            Documentos PDF
          </label>
          <div
            id="drop-zone"
            class="border border-dashed border-muted rounded-lg p-4 text-center cursor-pointer
                   bg-surface hover:border-primary transition-colors"
          >
            <p class="text-xs text-ink">Arrastra o selecciona PDFs</p>
            <input
              id="file-input"
              type="file"
              accept=".pdf,application/pdf"
              multiple
              class="hidden"
            />
          </div>
        </section>

        <section id="file-list" class="space-y-1 max-h-24 overflow-y-auto">
          <p class="text-xs text-muted italic">Sin archivos</p>
        </section>

        <section>
          <label for="library-select" class="block text-xs font-medium text-primary mb-1">
            Librería Regex
          </label>
          <select
            id="library-select"
            class="w-full border border-muted rounded px-2 py-1.5 text-xs
                   bg-surface text-ink focus:outline-none focus:ring-1 focus:ring-primary"
          ></select>
          <p id="library-desc" class="text-xs text-muted mt-0.5"></p>
        </section>

        <section class="space-y-2">
          <button
            id="btn-extract"
            disabled
            class="w-full bg-ink text-surface rounded py-2 text-xs font-medium
                   hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Extraer texto
          </button>

          <div class="grid grid-cols-2 gap-2">
            <button
              id="btn-export-all"
              disabled
              class="bg-ink text-surface rounded py-2 text-xs font-medium
                     hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              Exportar todo
            </button>
            <button
              id="btn-export-regex"
              disabled
              class="bg-ink text-surface rounded py-2 text-xs font-medium
                     hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              Exportar regex
            </button>
          </div>
        </section>

        <section>
          <label class="block text-xs font-medium text-primary mb-1">
            Vista previa
          </label>
          <pre
            id="preview-area"
            class="bg-surface border border-muted rounded p-2 text-xs text-ink
                   h-32 overflow-y-auto whitespace-pre-wrap font-mono"
          ></pre>
        </section>
      </main>

      <!-- footer minimalista -->
      <footer class="px-4 py-1.5 border-t border-muted bg-surface">
        <p id="status-bar" class="text-xs text-muted italic">
          Selecciona PDFs
        </p>
      </footer>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
